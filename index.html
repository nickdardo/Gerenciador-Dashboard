<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Escalas · dnata</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="stylesheet" href="css/style.css">
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ══════════════════════════════════════════════
     AUTH SHELL — shown when logged out
════════════════════════════════════════════════ -->
<div id="auth-shell" style="display:none">
  <div class="auth-container">

    <!-- Brand -->
    <div class="auth-brand">
      <img src="assets/dnata-logo.svg" alt="dnata" class="auth-logo">
      <span class="auth-brand-title">Painel de Escala</span>
    </div>

    <!-- Card — filled by auth.js -->
    <div class="auth-card" id="auth-card"></div>

  </div>
</div>

<!-- ══════════════════════════════════════════════
     APP SHELL — shown when logged in
════════════════════════════════════════════════ -->
<div id="app-shell" style="display:none">

  <!-- Sidebar — filled by app.js -->
  <div id="sidebar"></div>

  <!-- Main area -->
  <div id="main-area">
    <!-- Topbar — filled by app.js -->
    <div id="topbar"></div>
    <!-- Page content — filled by navigateTo() -->
    <div id="page-content"></div>
  </div>

</div>

<!-- Scripts -->
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/pages.js"></script>
<script src="js/admin.js"></script>

<script>
  // Init after all scripts loaded
  initAuth();
</script>
</body>
</html>
