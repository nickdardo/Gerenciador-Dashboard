<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Escalas · dnata</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="stylesheet" href="css/style.css">
  <!-- Tabler Icons (usado em toda a app via classes "ti ti-*") -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2/dist/tabler-icons.min.css">
  <!-- SheetJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ══════════════════════════════════════════════
     AUTH SHELL — shown when logged out
════════════════════════════════════════════════ -->
<div id="auth-shell" style="display:none">
  <div class="auth-container">

    <!-- Brand -->
    <div class="auth-brand">
      <img src="assets/dnata-logo.svg" alt="dnata" class="auth-logo">
      <span class="auth-brand-title">Painel de Escala</span>
    </div>

    <!-- Card — filled by auth.js -->
    <div class="auth-card" id="auth-card"></div>

  </div>
</div>

<!-- ══════════════════════════════════════════════
     APP SHELL — shown when logged in
════════════════════════════════════════════════ -->
<div id="app-shell" style="display:none">

  <!-- Sidebar — filled by app.js -->
  <div id="sidebar"></div>

  <!-- Main area -->
  <div id="main-area">
    <!-- Topbar — filled by app.js -->
    <div id="topbar"></div>
    <!-- Page content — filled by navigateTo() -->
    <div id="page-content"></div>
    <!-- Botão flutuante "voltar ao topo" — aparece sozinho quando rola bastante -->
    <button id="btn-topo" onclick="document.getElementById('page-content').scrollTo({top:0,behavior:'smooth'})" aria-label="Voltar ao topo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    </button>
  </div>

</div>

<!-- Scripts -->
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/pages.js"></script>
<script src="js/admin.js"></script>
<script src="js/aderencia.js"></script>
<script src="js/headcount.js"></script>

<script>
  window.addEventListener('load', function() {
    if (typeof initAuth === 'function') {
      initAuth();
    }
  });
</script>
</body>
</html>
